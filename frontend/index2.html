<!DOCTYPE html>
<html>
<head>
    <title>语音交互Demo</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .container { padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .btn { padding: 10px 20px; margin: 10px 5px; cursor: pointer; }
        #text-input { width: 100%; height: 100px; margin: 10px 0; padding: 10px; }
        #status { color: #666; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>语音交互演示</h1>
        
        <!-- 语音录制区域 -->
        <div>
            <button id="record-btn" class="btn">🎤 开始录音</button>
            <button id="stop-record-btn" class="btn" disabled>🛑 停止录音</button>
            <div id="record-status">未录音</div>
        </div>
        
        <!-- 文字输入区域 -->
        <div>
            <textarea id="text-input" placeholder="请输入文字（或录音后自动填充）"></textarea>
        </div>
        
        <!-- TTS播放区域 -->
        <div>
            <button id="play-btn" class="btn">🔊 播放语音</button>
            <button id="stop-play-btn" class="btn" disabled>⏹ 停止播放</button>
            <div id="status">就绪</div>
        </div>
    </div>

    <script>
        // 全局变量
        let mediaRecorder;
        let audioChunks = [];
        let ws;
        let audioContext;
        let audioSource;
        let isRecording = false;
        let isPlaying = false;
        
        // DOM元素
        const recordBtn = document.getElementById('record-btn');
        const stopRecordBtn = document.getElementById('stop-record-btn');
        const playBtn = document.getElementById('play-btn');
        const stopPlayBtn = document.getElementById('stop-play-btn');
        const textInput = document.getElementById('text-input');
        const recordStatus = document.getElementById('record-status');
        const status = document.getElementById('status');

        // 更新UI状态
        function updateUI() {
            recordBtn.disabled = isRecording;
            stopRecordBtn.disabled = !isRecording;
            playBtn.disabled = isPlaying || !textInput.value.trim();
            stopPlayBtn.disabled = !isPlaying;
        }

        // 更新状态显示
        function updateStatus(message, type = 'info') {
            status.textContent = message;
            status.className = type;
        }

        // 更新录音状态
        function updateRecordStatus(message, type = 'info') {
            recordStatus.textContent = message;
            recordStatus.className = type;
        }

        // 初始化AudioContext
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 录音功能
        recordBtn.addEventListener('click', async () => {
            try {
                isRecording = true;
                updateUI();
                updateRecordStatus("正在录音...", 'recording');
                audioChunks = [];

                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        sampleRate: 24000
                    }
                });
                
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'audio/webm;codecs=opus'
                });
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        audioChunks.push(e.data);
                    }
                };
                
                mediaRecorder.onstop = async () => {
                    isRecording = false;
                    updateUI();
                    updateRecordStatus("录音完成，正在转文字...", 'processing');

                    try {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const formData = new FormData();
                        formData.append('file', audioBlob, 'recording.webm');

                        // 调用ASR接口转文字
                        const response = await fetch('/api/ast-tts/asr/upload', {
                            method: 'POST',
                            body: formData
                        });
                        
                        const result = await response.json();
                        if (result.success) {
                            textInput.value = result.text;
                            updateRecordStatus("录音转文字完成", 'success');
                        } else {
                            updateRecordStatus(`转文字失败: ${result.message || '未知错误'}`, 'error');
                        }
                    } catch (error) {
                        updateRecordStatus(`转文字失败: ${error.message}`, 'error');
                        console.error('ASR Error:', error);
                    } finally {
                        // 清理资源
                        stream.getTracks().forEach(track => track.stop());
                    }
                };
                
                mediaRecorder.start(1000); // 每秒收集一次数据
            } catch (error) {
                isRecording = false;
                updateUI();
                updateRecordStatus(`录音失败: ${error.message}`, 'error');
                console.error('Recording Error:', error);
            }
        });

        stopRecordBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        });

        // 播放TTS语音
        playBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text) {
                alert("请输入文字！");
                return;
            }

            try {
                isPlaying = true;
                updateUI();
                updateStatus("正在连接TTS服务...", 'processing');
                
                // 关闭之前的WebSocket连接
                if (ws) {
                    ws.close();
                }

                // 建立WebSocket连接
                ws = new WebSocket(`ws://${window.location.host}/api/tts/tts`);
                
                ws.onopen = () => {
                    updateStatus("正在发送文本...", 'processing');
                    // 发送文字到服务端
                    ws.send(text);
                };

                // 接收服务端消息
                ws.onmessage = (event) => {
                    if (typeof event.data === 'string') {
                        // 处理文本消息
                        if (event.data.startsWith("错误:")) {
                            updateStatus(event.data, 'error');
                            isPlaying = false;
                            updateUI();
                        } else if (event.data.startsWith("服务端错误:")) {
                            updateStatus(event.data, 'error');
                            isPlaying = false;
                            updateUI();
                        } else {
                            updateStatus(event.data, 'success');
                            // 服务端已完成处理，保持连接以便后续请求
                            isPlaying = false;
                            updateUI();
                        }
                    }
                };

                ws.onclose = (event) => {
                    if (isPlaying) {
                        if (event.code !== 1000) {
                            updateStatus("连接意外断开", 'error');
                        } else {
                            updateStatus("服务已关闭", 'info');
                        }
                        isPlaying = false;
                        updateUI();
                    }
                };

                ws.onerror = (error) => {
                    updateStatus(`WebSocket错误: ${error.message}`, 'error');
                    isPlaying = false;
                    updateUI();
                    console.error('WebSocket Error:', error);
                };
            } catch (error) {
                updateStatus(`播放失败: ${error.message}`, 'error');
                isPlaying = false;
                updateUI();
                console.error('Playback Error:', error);
            }
        });

        // 停止播放
        stopPlayBtn.addEventListener('click', () => {
            try {
                if (ws) {
                    ws.close();
                }
                updateStatus("已停止", 'info');
                isPlaying = false;
                updateUI();
            } catch (error) {
                updateStatus(`停止时出错: ${error.message}`, 'error');
                isPlaying = false;
                updateUI();
                console.error('Stop Error:', error);
            }
        });

        // 监听文本输入事件，更新UI状态
        textInput.addEventListener('input', () => {
            updateUI();
        });

        // 初始化UI
        updateUI();
        updateStatus("就绪");
        updateRecordStatus("未录音");
    </script>
</body>
</html>
