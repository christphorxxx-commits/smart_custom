<!DOCTYPE html>
<html lang="">
<head>
    <title>语音交互Demo</title>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%234A90E2'/%3E%3Cpath d='M30 40v20h40v-20z' fill='white'/%3E%3Ccircle cx='40' cy='50' r='5' fill='%234A90E2'/%3E%3Ccircle cx='60' cy='50' r='5' fill='%234A90E2'/%3E%3C/svg%3E" type="image/svg+xml">
    <style>
        body { font-family: Arial,serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .container { padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .btn { padding: 10px 20px; margin: 10px 5px; cursor: pointer; }
        #text-input { width: 100%; height: 100px; margin: 10px 0; padding: 10px; }
        #status { color: #666; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>语音交互演示</h1>
        
        <!-- 语音录制区域 -->
        <div>
            <button id="record-btn" class="btn">🎤 开始录音</button>
            <button id="stop-record-btn" class="btn" disabled>🛑 停止录音</button>
            <div id="record-status">未录音</div>
        </div>
        
        <!-- 文字输入区域 -->
        <div>
            <label for="text-input"></label><textarea id="text-input" placeholder="请输入文字（或录音后自动填充）"></textarea>
        </div>
        
        <!-- TTS播放区域 -->
        <div>
            <button id="play-btn" class="btn">🔊 播放语音</button>
            <button id="stop-play-btn" class="btn" disabled>⏹ 停止播放</button>
            <div id="status">就绪</div>
        </div>
    </div>

    <script>
        // 全局变量
        let mediaRecorder;
        let audioChunks = [];
        let ws;
        let audioContext;
        let audioSource;
        let isRecording = false;
        let isPlaying = false;
        
        // DOM元素
        const recordBtn = document.getElementById('record-btn');
        const stopRecordBtn = document.getElementById('stop-record-btn');
        const playBtn = document.getElementById('play-btn');
        const stopPlayBtn = document.getElementById('stop-play-btn');
        const textInput = document.getElementById('text-input');
        const recordStatus = document.getElementById('record-status');
        const status = document.getElementById('status');

        // 初始化页面
        function initPage() {
            updateUI();
            updateStatus('就绪');
        }

        // 更新UI状态
        function updateUI() {
            recordBtn.disabled = isRecording;
            stopRecordBtn.disabled = !isRecording;
            playBtn.disabled = isPlaying || !textInput.value.trim();
            stopPlayBtn.disabled = !isPlaying;
        }

        // 更新状态显示
        function updateStatus(message, type = 'info') {
            status.textContent = message;
            status.className = type === 'error' ? 'error' : 'info';
        }

        // 更新录音状态
        function updateRecordStatus(message, type = 'info') {
            recordStatus.textContent = message;
            recordStatus.className = type === 'error' ? 'error' : 'info';
        }

        // 初始化AudioContext
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 录音功能
        recordBtn.addEventListener('click', async () => {
            try {
                isRecording = true;
                updateUI();
                updateRecordStatus("正在录音...", 'info');
                audioChunks = [];

                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        sampleRate: 24000
                    } 
                });
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'audio/webm;codecs=opus'
                });
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        audioChunks.push(e.data);
                    }
                };
                
                mediaRecorder.onstop = async () => {
                    isRecording = false;
                    updateUI();
                    updateRecordStatus("录音完成，正在转文字...", 'info');

                    try {
                        // 转换为WAV格式
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const formData = new FormData();
                        formData.append('file', audioBlob, 'recording.webm');

                        // 调用ASR接口转文字
                        const response = await fetch('/api/ast-tts/asr/upload', {
                            method: 'POST',
                            body: formData
                        });
                        const result = await response.json();
                        
                        if (result.success && result.text) {
                            textInput.value = result.text;
                            updateRecordStatus("录音转文字完成", 'success');
                        } else {
                            updateRecordStatus("转文字失败: " + (result.message || '未知错误'), 'error');
                        }
                    } catch (error) {
                        updateRecordStatus("转文字失败: " + error.message, 'error');
                        console.error('ASR Error:', error);
                    }
                    
                    // 清理资源
                    stream.getTracks().forEach(track => track.stop());
                    updateUI();
                };
                
                mediaRecorder.start(1000); // 每秒收集一次数据
                
            } catch (error) {
                isRecording = false;
                updateUI();
                updateRecordStatus("录音失败: " + error.message, 'error');
                console.error('Recording Error:', error);
            }
        });

        stopRecordBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        });

        // 播放TTS语音
        playBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text) {
                alert("请输入文字！");
                return;
            }

            try {
                isPlaying = true;
                updateUI();
                updateStatus("正在生成语音并播放...", 'info');
                
                // 关闭之前的WebSocket连接
                if (ws) {
                    ws.close();
                }

                // 初始化音频上下文
                initAudioContext();

                // 建立WebSocket连接
                ws = new WebSocket(`ws://${window.location.host}/api/ast-tts/tts/ws`);
                
                ws.onopen = () => {
                    updateStatus("正在连接TTS服务...", 'info');
                    // 发送文字到服务端
                    ws.send(text);
                };

                ws.onmessage = (event) => {
                    const message = event.data;
                    
                    if (message === "TTS_COMPLETE") {
                        updateStatus("播放完成", 'success');
                        isPlaying = false;
                        updateUI();
                    } else if (message.startsWith("TTS_ERROR:")) {
                        updateStatus("TTS错误: " + message.substring(10), 'error');
                        isPlaying = false;
                        updateUI();
                    } else {
                        // 处理音频流数据
                        event.data.arrayBuffer().then((buffer) => {
                            audioContext.decodeAudioData(buffer, (audioBuffer) => {
                                const source = audioContext.createBufferSource();
                                source.buffer = audioBuffer;
                                source.connect(audioContext.destination);
                                source.start();
                                
                                // 保存当前播放源，用于停止
                                audioSource = source;
                            });
                        }).catch(error => {
                            console.error('Audio decode error:', error);
                        });
                    }
                };

                ws.onclose = (event) => {
                    if (event.code !== 1000) { // 非正常关闭
                        updateStatus("连接意外断开", 'error');
                        isPlaying = false;
                        updateUI();
                    }
                };

                ws.onerror = (error) => {
                    updateStatus("WebSocket错误: " + error.message, 'error');
                    isPlaying = false;
                    updateUI();
                };

            } catch (error) {
                updateStatus("TTS播放失败: " + error.message, 'error');
                isPlaying = false;
                updateUI();
            }
        });

        // 停止播放
        stopPlayBtn.addEventListener('click', () => {
            try {
                if (ws) {
                    ws.close();
                }
                if (audioSource) {
                    audioSource.stop();
                }
                updateStatus("已停止", 'info');
                isPlaying = false;
                updateUI();
            } catch (error) {
                console.error('Stop playback error:', error);
                updateStatus("停止播放时出错: " + error.message, 'error');
            }
        });

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initPage();
        });

        // 监听文本框输入事件，更新UI状态
        textInput.addEventListener('input', () => {
            updateUI();
        });
    </script>
</body>
</html>
